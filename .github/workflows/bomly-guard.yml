name: Bomly Guard

on:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Guard dependency changes
        uses: bomly-dev/bomly-guard@v1
        with:
          log-level: debug
          ecosystems: maven
          matchers: +scorecard
          fail-on: any
          comment-summary-in-pr: always
          auditors: -license
